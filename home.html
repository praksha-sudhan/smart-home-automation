
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Home Dashboard</title>
  <link rel="stylesheet" href="home.css">
</head>
<body>
  <header>
    <h1>Smart Home Dashboard</h1>
  </header>
  <main class="dashboard">
    <section class="card">
      <h2>Device Management</h2>
      <ul>
        <li>Lights: <button>Toggle</button></li>
        <li>Thermostat: <button>Adjust</button></li>
        <li>Security Cameras: <button>View</button></li>
      </ul>
    </section>

    <section class="card">
      <h2>Automation & Scheduling</h2>
      <p>Create rules and schedules for devices.</p>
      <button>Create Rule</button>
      <button>Set Schedule</button>
    </section>
  </main>
</body>
</html>
